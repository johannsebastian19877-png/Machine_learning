# Conda environment alternativo a pip
# Crear:    conda env create -f environment.yml
# Activar:  conda activate pairtrading
# Actualizar: conda env update -f environment.yml --prune

name: pairtrading
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.13
  - matplotlib>=3.8
  - seaborn>=0.13
  - scikit-learn>=1.5
  - statsmodels>=0.14
  - pyarrow>=15
  - jupyter
  - ipykernel
  - nbformat
  - nbconvert
  - pytest
  - pip:
      - yfinance==1.2.0
      - pykalman==0.11.2
      - arch>=7.0,<9.0
      - hmmlearn>=0.3,<0.4
      - torch>=2.2,<3.0
      - gymnasium>=1.0,<2.0
      - stable-baselines3>=2.3,<3.0
