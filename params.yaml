# =========================================================================
# Configuracion central del pipeline (referencia)
# Los notebooks por simplicidad declaran estos valores inline.
# Este archivo documenta los parametros canonicos para facilitar cambios.
# =========================================================================

data:
  start_date: "2010-01-01"
  end_date: null              # null = today; usar string "YYYY-MM-DD" para pinear
  tickers:
    gold: "GC=F"              # alternativa ETF: "GLD"
    silver: "SI=F"            # alternativa ETF: "SLV"
  trading_days_per_year: 252

cointegration:
  ols_window_static: null     # null = todo el periodo
  rolling_adf_window: 252
  rolling_adf_step: 21
  signif_level: 0.05

kalman:
  delta: 1.0e-5               # varianza del random walk del estado
  observation_variance: 0.001
  warmup_days: 252

features:
  zscore_window: 60
  ema_spans: [5, 20]
  vol_window: 20
  rsi_window: 14
  bollinger_window: 20
  gsr_zscore_window: 60
  hmm_n_states: 3
  momentum_windows: [5, 20]

target:
  horizon_days: 5
  type: "direction"           # "direction" o "regression"

splits:
  train_end: "2018-12-31"
  val_end: "2021-12-31"
  # test: val_end -> hoy

lstm:
  lookback: 60
  hidden_size: 32
  num_layers: 1
  dropout: 0.2
  batch_size: 64
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  max_epochs: 40
  patience: 6
  seed: 42

signals_benchmark:
  entry_z: 2.0
  exit_z: 0.5
  stop_z: 4.0

environment:
  cost_bps: 5.0
  turnover_penalty: 1.0e-5
  episode_length: 252

ppo:
  total_timesteps: 100000
  learning_rate: 3.0e-4
  n_steps: 512
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  net_arch: [64, 64]
  seed: 42

backtest:
  cost_sensitivity_bps: [0, 1, 2, 5, 10, 20, 50]
